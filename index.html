<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma de Onboarding Digital</title>
    <meta name="description" content="Plataforma completa de onboarding digital para novos colaboradores" />

    <meta property="og:title" content="fe9f8830-2ad0-4278-a848-85028fb91644" />
    <meta property="og:type" content="website" />
    
  </head>

  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Restore redirect from 404.html
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          // Remove the base path and restore the actual route
          var base = '/firststep-vivo-challenge/';
          if (redirect.startsWith(base)) {
            redirect = redirect.slice(base.length - 1);
          }
          if (redirect !== window.location.pathname + window.location.search + window.location.hash) {
            window.history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
